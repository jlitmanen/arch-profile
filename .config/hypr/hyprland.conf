###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = kitty -e yazi
$menu = fuzzel --config ~/.config/hypr/fuzzel/fuzzel.ini
$bar = waybar

source = ~/.config/hypr/source/autostart.conf
source = ~/.config/hypr/source/bindings.conf
source = ~/.config/hypr/source/monitors.conf
source = ~/.config/hypr/source/appearance.conf
source = ~/.config/hypr/source/input.conf
source = ~/.config/hypr/source/windowrules.conf
source = ~/.config/hypr/source/permissions.conf

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata
