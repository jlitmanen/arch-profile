#############
### INPUT ###
#############

input {
    kb_layout = fi
    kb_variant = nodeadkeys
    kb_model = pc105
    kb_options = caps:super
    kb_rules =
    numlock_by_default = true
    follow_mouse = 0
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}
gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
